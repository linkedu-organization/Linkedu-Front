steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_BACKEND_URL=$_VITE_BACKEND_URL'
      - '--build-arg'
      - 'VITE_CLOUDINARY_CLOUD_NAME=$_VITE_CLOUDINARY_CLOUD_NAME'
      - '--build-arg'
      - 'VITE_CLOUDINARY_UPLOAD_PRESET=$_VITE_CLOUDINARY_UPLOAD_PRESET'
      - '-t'
      - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'